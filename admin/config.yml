backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "✨ Add {{collection}} '{{slug}}'"
    update: "📝 Update {{collection}} '{{slug}}'"
    delete: "🗑️ Delete {{collection}} '{{slug}}'"
    uploadMedia: "📁 Upload '{{path}}'"
    deleteMedia: "🗑️ Delete '{{path}}'"

media_folder: "assets/uploads"
public_folder: "/assets/uploads"
publish_mode: editorial_workflow
site_url: https://YOUR-SITE.netlify.app

collections:

  - name: "homepage"
    label: "🏠 Homepage Settings"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "_data/hero.json"
        fields:
          - {label: "Main Heading", name: "heading", widget: "string"}
          - {label: "Sub Heading", name: "subheading", widget: "string"}
          - {label: "Hero Image", name: "image", widget: "image", required: false}
          - {label: "CTA Button Text", name: "cta_text", widget: "string", default: "Book Appointment"}
          - {label: "Secondary Button Text", name: "cta2_text", widget: "string", default: "View Courses"}
          - {label: "Announcement Banner", name: "announcement", widget: "string", required: false, hint: "e.g. 🎉 Special Offer — 20% off this week!"}
          - {label: "Show Announcement?", name: "show_announcement", widget: "boolean", default: false}
      - label: "About Section"
        name: "about"
        file: "_data/about.json"
        fields:
          - {label: "Heading", name: "heading", widget: "string"}
          - {label: "About Text", name: "text", widget: "markdown"}
          - {label: "About Image", name: "image", widget: "image", required: false}
          - {label: "Years Experience", name: "years", widget: "number", default: 10}
          - {label: "Happy Clients", name: "clients", widget: "number", default: 2500}
          - {label: "Courses Offered", name: "courses", widget: "number", default: 12}
          - {label: "Students Trained", name: "students", widget: "number", default: 800}
      - label: "Contact & Business Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - {label: "Phone 1", name: "phone1", widget: "string", default: "9843805588"}
          - {label: "Phone 2", name: "phone2", widget: "string", default: "9823207031"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string", default: "9779843805588"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Address", name: "address", widget: "string", default: "New Baneshwor, Kathmandu, Nepal"}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "TikTok URL", name: "tiktok", widget: "string", required: false}
          - {label: "Google Maps Embed", name: "maps_url", widget: "string", required: false}
          - {label: "eSewa Number", name: "esewa", widget: "string", default: "9843805588"}

  - name: "services"
    label: "💅 Services"
    folder: "_data/services"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Service Name", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Hair Care","Skin Care","Makeup","Nail Art","Bridal","Body Treatment"]}
      - {label: "Icon", name: "icon", widget: "string", default: "💇"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price (Rs.)", name: "price", widget: "string"}
      - {label: "Duration", name: "duration", widget: "string", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Featured?", name: "featured", widget: "boolean", default: false}
      - {label: "Active?", name: "active", widget: "boolean", default: true}

  - name: "courses"
    label: "🎓 Academy Courses"
    folder: "_data/courses"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Course Name", name: "title", widget: "string"}
      - {label: "Icon", name: "icon", widget: "string", default: "✂️"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Duration", name: "duration", widget: "string"}
      - {label: "Fee (Rs.)", name: "fee", widget: "string"}
      - {label: "Schedule", name: "schedule", widget: "string"}
      - {label: "Description", name: "description", widget: "markdown"}
      - {label: "Topics", name: "topics", widget: "list"}
      - {label: "Certificate?", name: "certificate", widget: "boolean", default: true}
      - {label: "Online Available?", name: "online", widget: "boolean", default: false}
      - {label: "Enrolling?", name: "enrolling", widget: "boolean", default: true}

  - name: "blog"
    label: "📝 Blog & News"
    folder: "blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["Haircare Tips","Skin Care","Bridal Trends","Hair Science","Color Science","Academy News","Offers","Studio News"]}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Author", name: "author", widget: "string", default: "Natural Beauty Clinic"}
      - {label: "Published?", name: "published", widget: "boolean", default: true}

  - name: "gallery"
    label: "🖼️ Gallery"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Caption", name: "title", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Category", name: "category", widget: "select", options: ["Hair","Skin","Makeup","Bridal","Nails","Academy","Before & After"]}
      - {label: "Featured?", name: "featured", widget: "boolean", default: false}
      - {label: "Date", name: "date", widget: "datetime"}

  - name: "videos"
    label: "🎥 Videos"
    folder: "_data/videos"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "YouTube URL", name: "url", widget: "string", hint: "Paste full YouTube URL"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["Tutorial","Before & After","Course Preview","Client Review","Promotional"]}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Date", name: "date", widget: "datetime"}

  - name: "downloads"
    label: "📁 Downloads & Files"
    folder: "_data/downloads"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "File Title", name: "title", widget: "string"}
      - {label: "Upload File", name: "file", widget: "file"}
      - {label: "File Type", name: "type", widget: "select", options: ["PDF","DOCX","Excel","ZIP","Image","Video","Other"]}
      - {label: "Category", name: "category", widget: "select", options: ["Service Menu","Price List","Course Prospectus","Certificate","Form","Brochure","Other"]}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "File Size", name: "size", widget: "string", required: false, hint: "e.g. 2.4 MB"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Public?", name: "public", widget: "boolean", default: true}

  - name: "team"
    label: "👩‍🏫 Team"
    folder: "_data/team"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Specialization", name: "specialization", widget: "string"}
      - {label: "Bio", name: "bio", widget: "text"}
      - {label: "Skills", name: "skills", widget: "list"}
      - {label: "Order", name: "order", widget: "number", default: 1}

  - name: "testimonials"
    label: "⭐ Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Client Name", name: "name", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Review", name: "review", widget: "text"}
      - {label: "Rating", name: "rating", widget: "number", min: 1, max: 5, default: 5}
      - {label: "Service", name: "service", widget: "string", required: false}
      - {label: "Featured?", name: "featured", widget: "boolean", default: false}

  - name: "announcements"
    label: "📢 Offers & Announcements"
    folder: "_data/announcements"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Offer","Announcement","Notice","Event","New Service"]}
      - {label: "Content", name: "content", widget: "markdown"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Valid Until", name: "expiry", widget: "datetime", required: false}
      - {label: "Active?", name: "active", widget: "boolean", default: true}
      - {label: "Homepage?", name: "homepage", widget: "boolean", default: true}

  - name: "faq"
    label: "❓ FAQ"
    folder: "_data/faq"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Question", name: "question", widget: "string"}
      - {label: "Answer", name: "answer", widget: "text"}
      - {label: "Category", name: "category", widget: "select", options: ["Services","Academy","Booking","Payment","General"]}
      - {label: "Order", name: "order", widget: "number", default: 1}

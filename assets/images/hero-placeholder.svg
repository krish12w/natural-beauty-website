<svg viewBox="0 0 600 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8D0E0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C97B8A;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="180" fill="url(#accent)"/>
  <circle cx="480" cy="600" r="120" fill="rgba(201,168,76,0.1)"/>
  <circle cx="80" cy="500" r="80" fill="rgba(201,121,138,0.1)"/>
  <!-- Scissors icon -->
  <g transform="translate(200,280)" opacity="0.3">
    <text font-size="180" font-family="serif" fill="#C9A84C">✂</text>
  </g>
  <!-- Text -->
  <text x="300" y="560" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#8A7070" font-style="italic">Natural Beauty</text>
  <text x="300" y="590" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#A09090" letter-spacing="3">Clinic &amp; Academy</text>
  <!-- Decorative line -->
  <line x1="220" y1="610" x2="380" y2="610" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <text x="300" y="635" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#B09090" letter-spacing="2">NEW BANESHWOR · KATHMANDU</text>
  <!-- Upload hint -->
  <rect x="160" y="660" width="280" height="44" rx="22" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="300" y="687" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8A7070">📷 Upload hero image via Admin Panel</text>
</svg>

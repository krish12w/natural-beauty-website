# ═══════════════════════════════════════════════
# NATURAL BEAUTY CLINIC & ACADEMY
# netlify.toml
# ═══════════════════════════════════════════════

[build]
  # Netlify will serve files from the /public folder
  publish = "public"
  # No build command needed — pure static site
  command = "echo 'Deploying Natural Beauty Clinic & Academy'"

# ── SECURITY HEADERS ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Admin panel — no caching, no search engine indexing
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Data files — always fresh so CMS changes appear immediately
[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"

# Static assets — cached for 1 day
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── REDIRECTS ──
# Admin panel route
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# 404 page
[[redirects]]
  from = "/404"
  to = "/static/404.html"
  status = 404

# Catch-all — send everything to index.html (SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
